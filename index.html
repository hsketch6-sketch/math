<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>수학 개념 시각화 v0.2</title>


<style>

body{

font-family:Arial,sans-serif;
background:#f3f6ff;
padding:30px;

}


.container{

max-width:1000px;
margin:auto;

background:white;

padding:30px;

border-radius:25px;

box-shadow:0 10px 30px #ddd;

text-align:center;

}



button,input{

font-size:18px;

padding:10px;

margin:5px;

border-radius:10px;

}



button{

border:0;

background:#4b7bec;

color:white;

cursor:pointer;

}



.menu button{

width:220px;

}



.section{

margin-top:30px;

}



.hidden{

display:none;

}



/* ===================
   저울
=================== */


.balance{

display:flex;

justify-content:center;

align-items:center;

gap:40px;

margin:40px;

}


.side{

width:280px;

min-height:170px;

border:5px solid #555;

border-radius:20px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

font-size:30px;

background:#fafafa;

}


.equal{

font-size:60px;

}



.block{

display:inline-block;

background:#4b7bec;

color:white;

padding:5px 10px;

margin:3px;

border-radius:8px;

}



.move{

animation:move .8s;

}



@keyframes move{


50%{

transform:translateY(-40px);

}

}



/* ===================
   그래프
=================== */


.graph-box{

overflow:auto;

}



svg{

background:#fafafa;

border:3px solid #555;

border-radius:15px;

}



.line{

fill:none;

stroke-width:4;

stroke-dasharray:1000;

stroke-dashoffset:1000;

animation:draw 1.5s forwards;

}



.point{

r:5;

}



@keyframes draw{


to{

stroke-dashoffset:0;

}

}



.info{

font-size:22px;

margin:20px;

}



</style>


</head>



<body>



<div class="container">

<h1>📚 수학 개념 시각화</h1>



<div class="menu">


<button onclick="openTab('balance')">

⚖ 방정식 저울

</button>



<button onclick="openTab('graph')">

📈 그래프 실험실

</button>


</div>





<!-- =================
     저울 영역
================= -->


<div id="balance" class="section">


<h2>⚖ 방정식 저울</h2>


<input id="equationInput"

value="x+3=7">


<button onclick="loadEquation()">

식 만들기

</button>



<div class="balance">


<div id="leftSide"

class="side">

</div>


<div class="equal">

=

</div>


<div id="rightSide"

class="side">

</div>


</div>




<div>


양변에 적용할 수


<input id="balanceNumber"

type="number"

value="3">


<button onclick="applyBalance(-1)">

- 적용

</button>


<button onclick="applyBalance(1)">

+ 적용

</button>


</div>



<div id="balanceInfo"

class="info">

</div>



</div>







<!-- =================
     그래프 영역
================= -->


<div id="graph"

class="section hidden">


<h2>📈 그래프 실험실</h2>


<input id="graphInput"

value="y=3x">



<button onclick="addGraph()">

그래프 추가

</button>



<button onclick="clearGraphs()">

전체 삭제

</button>



<br><br>


<div class="graph-box">


<svg id="graphSVG"

width="750"

height="550">

</svg>


</div>



<div id="graphInfo"

class="info">

</div>



</div>




</div>
<script>
// ===========================
// 탭 전환
// ===========================

function openTab(tab){

    document.getElementById("balance")
    .classList.add("hidden");

    document.getElementById("graph")
    .classList.add("hidden");


    document.getElementById(tab)
    .classList.remove("hidden");

}





// ===========================
// ⚖ 방정식 저울
// ===========================


let equationData={

    leftNumber:3,
    rightNumber:7

};





function makeBlocks(num){


    if(num<=0)
        return "";


    let html="";


    // 작은 숫자는 직접 표시

    if(num<=20){


        for(let i=0;i<num;i++){

            html+=`
            <span class="block">
            ■
            </span>
            `;

        }


        return html;

    }



    // 큰 숫자는 10 묶음

    let ten=Math.floor(num/10);

    let rest=num%10;



    for(let i=0;i<ten;i++){

        html+=`
        <span class="block">
        📦10
        </span>
        `;

    }



    for(let i=0;i<rest;i++){

        html+=`
        <span class="block">
        ■
        </span>
        `;

    }


    return html;


}





function parseEquation(text){


    text=text.replace(/\s/g,"");


    let split=text.split("=");


    if(split.length!==2)
        return null;



    let right=Number(split[1]);



    let match=
    split[0].match(
        /x([+-]\d+)/
    );



    if(match){


        return {

            leftNumber:
            Number(match[1]),

            rightNumber:
            right

        };


    }



    if(split[0]=="x"){


        return {

            leftNumber:0,

            rightNumber:right

        };


    }



    return null;


}






function loadEquation(){


    let result=
    parseEquation(
        document.getElementById(
            "equationInput"
        ).value
    );



    if(!result){


        alert(
        "현재 x+숫자=숫자 형태만 지원합니다."
        );


        return;

    }



    equationData=result;


    drawBalance();


}





function drawBalance(){


    let left=
    document.getElementById(
        "leftSide"
    );


    let right=
    document.getElementById(
        "rightSide"
    );



    if(equationData.leftNumber===0){


        left.innerHTML=
        `
        x
        `;


    }else{


        left.innerHTML=
        `
        x + ${equationData.leftNumber}

        <br>

        ${makeBlocks(
            equationData.leftNumber
        )}

        `;

    }





    right.innerHTML=

    `
    ${equationData.rightNumber}

    <br>

    ${makeBlocks(
        equationData.rightNumber
    )}

    `;



}







function applyBalance(direction){


    let value=
    Number(
        document.getElementById(
            "balanceNumber"
        ).value
    );



    let change=value*direction;



    let left=
    document.getElementById(
        "leftSide"
    );


    let right=
    document.getElementById(
        "rightSide"
    );



    left.classList.add("move");

    right.classList.add("move");



    setTimeout(()=>{


        left.classList.remove("move");

        right.classList.remove("move");



        // 양변 동일 변경

        equationData.leftNumber += change;

        equationData.rightNumber += change;




        drawBalance();



        document.getElementById(
            "balanceInfo"
        ).innerHTML=


        `
        양변에 ${change} 적용

        <br><br>

        현재:

        <br>

        x ${
        equationData.leftNumber>=0
        ?"+"
        :""
        }${equationData.leftNumber}

        =

        ${equationData.rightNumber}

        <br><br>

        정리 결과:

        <br>

        x = ${
        equationData.rightNumber
        -
        equationData.leftNumber
        }

        `;



    },800);



}




// 초기 실행

drawBalance();
// ===========================
// 📈 그래프 실험실
// ===========================


// 저장되는 그래프 목록

let graphList=[];




// 분수 처리

function parseNumber(value){


    if(value.includes("/")){


        let split=value.split("/");


        return Number(split[0])
        /
        Number(split[1]);


    }


    return Number(value);


}





// 함수 분석

function parseGraph(text){


    text=text.replace(/\s/g,"");


    let exp=text.replace("y=","");



    // 반비례

    if(exp.includes("/x")){


        let k=
        exp.replace("/x","");


        return {

            type:"inverse",

            k:parseNumber(k)

        };

    }




    // 일차함수


    let match=
    exp.match(
        /(-?[\d\/]*)x([+-].+)?/
    );



    if(!match)
        return null;



    let a=match[1];


    if(a===""||a==="+")
        a="1";


    if(a==="-")
        a="-1";



    return {


        type:"linear",

        a:parseNumber(a),

        b:
        match[2]
        ?
        parseNumber(
            match[2]
            )
        :
        0


    };


}





// 그래프 추가


function addGraph(){


    let text=
    document.getElementById(
        "graphInput"
    ).value;



    let graph=
    parseGraph(text);



    if(!graph){


        alert(
        "지원 형식: y=3x, y=1/2x, y=3/x"
        );


        return;

    }



    graph.name=text;


    graphList.push(graph);



    drawAllGraphs();



}





// 전체 삭제


function clearGraphs(){


    graphList=[];


    drawAllGraphs();



    document.getElementById(
        "graphInfo"
    ).innerHTML=
    "그래프가 모두 삭제되었습니다.";

}





function drawAllGraphs(){



    let svg=
    document.getElementById(
        "graphSVG"
    );


    svg.innerHTML="";



    let W=750;

    let H=550;

    let scale=40;



    // 축


    svg.innerHTML+=`

    <line

    x1="${W/2}"

    y1="0"

    x2="${W/2}"

    y2="${H}"

    stroke="black"

    />


    <line

    x1="0"

    y1="${H/2}"

    x2="${W}"

    y2="${H/2}"

    stroke="black"

    />

    `;





    // 그래프 반복

    graphList.forEach((graph,index)=>{


        let points="";



        // 일반 함수

        if(graph.type==="linear"){



            for(
            let x=-8;
            x<=8;
            x+=0.1
            ){



                let y=
                graph.a*x
                +
                graph.b;



                let sx=
                W/2+x*scale;


                let sy=
                H/2-y*scale;



                points+=
                `${sx},${sy} `;


            }



        }





        // 반비례

        if(graph.type==="inverse"){



            // 왼쪽

            for(
            let x=-8;
            x<-0.3;
            x+=0.05
            ){


                let y=
                graph.k/x;



                points+=
                `${W/2+x*scale},${H/2-y*scale} `;


            }



            // 오른쪽

            points+=" ";



            for(
            let x=0.3;
            x<=8;
            x+=0.05
            ){


                let y=
                graph.k/x;



                points+=
                `${W/2+x*scale},${H/2-y*scale} `;


            }


        }




        svg.innerHTML+=`

        <polyline

        points="${points}"

        class="line"

        style="stroke:hsl(${index*80},70%,50%)"

        />

        `;




    });





    // 정보 표시


    let info="";


    graphList.forEach((g,i)=>{


        info+=
        `${i+1}. ${g.name}<br>`;


    });



    document.getElementById(
        "graphInfo"
    ).innerHTML=info;



}







// 기본 그래프 표시

addGraph();
</script>

</body>
</html>
