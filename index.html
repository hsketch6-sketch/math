<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>그래프 계산기</title>
</head>

<body>

<h2>📈 그래프 계산기</h2>

<p>
※ 입력 규칙<br>
- xx = x² / xxx = x³<br>
- x^2 가능<br>
- sin, cos, tan, log, sqrt, abs 지원<br>
</p>

<input id="graphInput" value="y=sin(x)">
<button onclick="drawGraph()">그리기</button>

<p id="coord">(x, y)</p>

<svg id="graphSVG" width="700" height="450" style="border:1px solid #ccc;"></svg>

<script>

const svg = document.getElementById("graphSVG");

const W = 700;
const H = 450;

let scale = 40; // 자동 느낌용 기본값


// ===== 마우스 좌표 =====
svg.addEventListener("mousemove", function(e){

    const rect = svg.getBoundingClientRect();

    let mx = e.clientX - rect.left;
    let my = e.clientY - rect.top;

    let x = (mx - W/2) / scale;
    let y = (H/2 - my) / scale;

    document.getElementById("coord").innerText =
        `(${x.toFixed(2)}, ${y.toFixed(2)})`;
});


// ===== 수식 변환 =====
function convert(expr){

    return expr
        .replace("y=","")
        .replace(/\s/g,"")

        // ^ → **
        .replace(/\^/g, "**")

        // xx → x*x
        .replace(/x{2,}/g, (m)=>m.split("").join("*"))

        // 2x → 2*x
        .replace(/(\d)x/g, "$1*x")

        // x2 → x*2
        .replace(/x(\d)/g, "x*$1")

        // 괄호
        .replace(/\)x/g, ")*x")
        .replace(/x\(/g, "x*(")
        .replace(/\)\(/g, ")*(")

        // 수학 함수
        .replace(/sin/g, "Math.sin")
        .replace(/cos/g, "Math.cos")
        .replace(/tan/g, "Math.tan")
        .replace(/log/g, "Math.log")
        .replace(/sqrt/g, "Math.sqrt")
        .replace(/abs/g, "Math.abs")
        .replace(/exp/g, "Math.exp");
}


// ===== 그리드 =====
function drawGrid(){

    let g = "";

    for(let i=-10;i<=10;i++){

        let x = W/2 + i*scale;
        let y = H/2 - i*scale;

        g += `<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="#eee"/>`;
        g += `<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="#eee"/>`;

        if(i !== 0){
            g += `<text x="${x+2}" y="${H/2+12}" font-size="10">${i}</text>`;
            g += `<text x="${W/2+5}" y="${y-2}" font-size="10">${i}</text>`;
        }
    }

    g += `
    <line x1="${W/2}" y1="0" x2="${W/2}" y2="${H}" stroke="black"/>
    <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="black"/>
    `;

    return g;
}


// ===== 자동 스케일 =====
function autoScale(f){

    let maxY = 1;

    for(let x=-10;x<=10;x+=0.5){
        let y = f(x);
        if(isFinite(y)){
            maxY = Math.max(maxY, Math.abs(y));
        }
    }

    scale = Math.min(80, 200 / maxY);
}


// ===== 메인 =====
function drawGraph(){

    svg.innerHTML = "";

    let input = document.getElementById("graphInput").value;

    let expr = convert(input);

    let f;

    try{
        f = new Function("x", "return " + expr);
    }catch{
        alert("식 오류");
        return;
    }

    autoScale(f);

    let x = -10;
    let points = "";

    function animate(){

        for(let i=0;i<6;i++){

            if(x > 10) return;

            let y = f(x);

            if(isFinite(y)){

                let sx = W/2 + x*scale;
                let sy = H/2 - y*scale;

                points += `${sx},${sy} `;
            }

            x += 0.05;
        }

        svg.innerHTML = drawGrid() + `
        <polyline points="${points}" stroke="red" fill="none" stroke-width="2"/>
        `;

        requestAnimationFrame(animate);
    }

    animate();

    // ===== 점 3개 =====
    let xs = [-5, 0, 5];

    xs.forEach(x=>{
        let y = f(x);
        if(!isFinite(y)) return;

        let sx = W/2 + x*scale;
        let sy = H/2 - y*scale;

        svg.innerHTML += `<circle cx="${sx}" cy="${sy}" r="4" fill="blue"/>`;
    });

    // ===== 직사각형 =====
    let x1 = -2;
    let x2 = 2;

    let y1 = f(x1);
    let y2 = f(x2);

    if(isFinite(y1) && isFinite(y2)){

        let sx1 = W/2 + x1*scale;
        let sy1 = H/2 - y1*scale;

        let sx2 = W/2 + x2*scale;
        let sy2 = H/2 - y2*scale;

        svg.innerHTML += `
        <rect x="${sx1}" y="${sy2}"
        width="${sx2 - sx1}"
        height="${sy1 - sy2}"
        fill="green" opacity="0.2"/>
        `;
    }
}


// 엔터 실행
document.getElementById("graphInput")
.addEventListener("keydown", function(e){
    if(e.key === "Enter") drawGraph();
});

drawGraph();

</script>

</body>
</html>
