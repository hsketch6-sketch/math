<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Universal Graph Engine</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
}

#container{
    display:flex;
    min-height:100vh;
}

#left{
    width:70%;
    display:flex;
    flex-direction:column;
}

#topbar{
    padding:10px;
    background:#222;
    color:white;
}

#canvasWrap{
    flex:1;
    min-height:0;
}

canvas{
    width:100%;
    height:100%;
    display:block;
    background:#000;
}

#list{
    height:140px;
    overflow:auto;
    border-top:1px solid #444;
    background:#111;
    color:#0f0;
    font-size:13px;
}

.graphItem{
    padding:5px;
    border-bottom:1px solid #333;
}

#right{
    width:30%;
    background:#f4f4f4;
    padding:15px;
    overflow:auto;
}
</style>
</head>

<body>

<div id="container">

<div id="left">
    <div id="topbar">
        <input id="input" placeholder="식 입력 (예: x=tan(y), y=sin(x), x^2+y^2=1)">
        <button onclick="addGraph()">추가</button>
    </div>

    <div id="canvasWrap">
        <canvas id="c"></canvas>
    </div>

    <div id="list"></div>
</div>

<div id="right">
<h3>Function Types</h3>

<b>Explicit</b><br>
y = f(x)<br><br>

<b>Implicit</b><br>
F(x,y) = 0<br><br>

<b>Parametric</b><br>
x=f(t), y=g(t)<br><br>

<b>Polar</b><br>
r=f(θ)<br><br>

<hr>

<b>Policy:</b><br>
Everything will be drawn.<br>
Except meaningless or complex-only equations.
</div>

</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
    W = canvas.clientWidth;
    H = canvas.clientHeight;
    canvas.width = W;
    canvas.height = H;
}
window.onresize = resize;
resize();

let graphs = [];
let scale = 40;

function fix(expr){
    return expr
        .replace(/\^/g,"**")
        .replace(/tan/g,"Math.tan")
        .replace(/sin/g,"Math.sin")
        .replace(/cos/g,"Math.cos")
        .replace(/log/g,"Math.log")
        .replace(/([xy])([xy])/g,"$1*$2")
        .replace(/([0-9])([xy])/g,"$1*$2");
}

function parse(input){

    if(!input.includes("=")) return null;

    let [L,R] = input.split("=");

    L = fix(L);
    R = fix(R);

    return `${L} - (${R})`;
}

function addGraph(){
    let raw = document.getElementById("input").value;

    if(!raw.trim()) return;

    let expr = parse(raw);
    if(!expr){
        alert("Invalid");
        return;
    }

    let f;
    try{
        f = new Function("x","y","return " + expr);
    }catch(e){
        alert("Invalid");
        return;
    }

    graphs.push({
        raw,
        f
    });

    updateList();
}

function updateList(){
    let list = document.getElementById("list");
    list.innerHTML = "";

    graphs.forEach((g,i)=>{
        let d = document.createElement("div");
        d.className="graphItem";
        d.textContent = `[${i}] ${g.raw}`;
        list.appendChild(d);
    });
}

function draw(){

    ctx.fillStyle="#000";
    ctx.fillRect(0,0,W,H);

    // 좌표축
    ctx.strokeStyle="#555";
    ctx.beginPath();
    ctx.moveTo(0,H/2);
    ctx.lineTo(W,H/2);
    ctx.moveTo(W/2,0);
    ctx.lineTo(W/2,H);
    ctx.stroke();

    graphs.forEach((g,gi)=>{

        ctx.fillStyle = `hsl(${gi*60},100%,50%)`;

        for(let px=0; px<W; px++){
            for(let py=0; py<H; py++){

                let x = (px - W/2)/scale;
                let y = (H/2 - py)/scale;

                let v;

                try{
                    v = g.f(x,y);
                }catch{
                    continue;
                }

                if(!isFinite(v)) continue;
                if(Math.abs(v) > 100) continue;

                if(Math.abs(v) < 0.05){
                    ctx.fillRect(px,py,1,1);
                }
            }
        }
    });

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
