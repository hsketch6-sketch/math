<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>수학 저울</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f3f6ff;
    padding:30px;
}


.box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px #ddd;
}


input,button{
    font-size:18px;
    padding:10px;
    margin:5px;
    border-radius:10px;
}


button{
    cursor:pointer;
    border:0;
    background:#4b7bec;
    color:white;
}


.balance{

display:flex;
justify-content:center;
align-items:center;
gap:40px;
margin:50px;

}


.side{

width:280px;
min-height:160px;

border:5px solid #555;
border-radius:20px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

font-size:30px;

}


.equal{
font-size:60px;
}


.block{

display:inline-block;

padding:5px 10px;
margin:3px;

background:#4b7bec;
color:white;

border-radius:8px;

}


.move{

animation:move .8s;
}


.shake{

animation:shake .5s;
}


@keyframes move{

50%{
transform:translateY(-40px);
}

}


@keyframes shake{

25%{
transform:rotate(5deg);
}

50%{
transform:rotate(-5deg);
}

75%{
transform:rotate(5deg);
}

}


.info{

font-size:25px;
margin-top:20px;

}


</style>

</head>


<body>


<div class="box">


<h1>⚖ 수학 저울</h1>


<input id="eq"
value="x+3=7">

<button onclick="loadEquation()">
식 만들기
</button>


<div class="balance">


<div class="side" id="left"></div>

<div class="equal">
=
</div>

<div class="side" id="right"></div>


</div>



<div>

양변에 적용할 수

<input id="num" type="number" value="3">


<button onclick="operation(-1)">
- 적용
</button>


<button onclick="operation(1)">
+ 적용
</button>


</div>



<div class="info" id="info">

</div>



</div>




<script>


let equation={

x:true,
leftNumber:3,
rightNumber:7

};



function makeBlocks(n){


if(n<=20){

let r="";

for(let i=0;i<n;i++){

r+=`
<span class="block">
■
</span>
`;

}

return r;

}



let ten=Math.floor(n/10);

let rest=n%10;


let r="";


for(let i=0;i<ten;i++){

r+=`
<span class="block">
📦10
</span>
`;

}


for(let i=0;i<rest;i++){

r+=`
<span class="block">
■
</span>
`;

}


return r;

}





function parse(text){


text=text.replace(/\s/g,"");


let a=text.split("=");


if(a.length!==2)
return null;



let right=Number(a[1]);


let match=a[0].match(
/x([+-]\d+)/
);



if(match){

return{

leftNumber:Number(match[1]),
rightNumber:right

};

}



if(a[0]=="x"){

return{

leftNumber:0,
rightNumber:right

};

}



return null;


}





function loadEquation(){


let result=
parse(
document.getElementById("eq").value
);


if(!result){

alert("현재 x+숫자=숫자 형태만 지원합니다.");

return;

}


equation=result;

draw();


}





function draw(){



let left=
document.getElementById("left");


let right=
document.getElementById("right");



if(equation.leftNumber===0){


left.innerHTML=
`
x
`;

}else{


left.innerHTML=
`
x + ${equation.leftNumber}

<br>

${makeBlocks(equation.leftNumber)}

`;

}



right.innerHTML=
`

${equation.rightNumber}

<br>

${makeBlocks(equation.rightNumber)}

`;



}




function operation(type){



let value=
Number(
document.getElementById("num").value
);



let amount=value*type;



let left=
document.getElementById("left");

let right=
document.getElementById("right");



left.classList.add("move");
right.classList.add("move");



setTimeout(()=>{


left.classList.remove("move");
right.classList.remove("move");



equation.leftNumber+=amount;

equation.rightNumber+=amount;



// 계산 과정 표시

let sign=
amount>=0?"+":"";


document.getElementById("info").innerHTML=

`
양변에 ${amount}을(를) 적용<br>

(x ${equation.leftNumber>=0?"+":""}${equation.leftNumber})
=
${equation.rightNumber}

<br><br>

정답:
x = ${equation.rightNumber-equation.leftNumber}

`;



draw();



},800);



}





loadEquation();


</script>


</body>
</html>
