<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>방정식 저울</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    padding:30px;
}

.box{
    background:white;
    max-width:800px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    text-align:center;
}


input,button{
    padding:10px;
    font-size:18px;
    margin:5px;
}


.balance{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
    margin:40px;
}


.side{
    width:220px;
    min-height:100px;
    border:4px solid #555;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    background:#fafafa;
}


.equal{
    font-size:50px;
}


.result{
    font-size:30px;
    margin-top:30px;
}


.remove{
    animation:fade .5s;
}


@keyframes fade{
    from{
        opacity:1;
        transform:translateY(0);
    }
    to{
        opacity:0;
        transform:translateY(-30px);
    }
}

</style>

</head>

<body>


<div class="box">

<h1>⚖ 방정식 저울</h1>


<p>
현재 식
</p>


<div class="balance">


<div class="side" id="left">
x + 3
</div>


<div class="equal">
=
</div>


<div class="side" id="right">
7
</div>


</div>



<div>

양쪽에서 제거할 숫자

<input id="remove" type="number" value="3">


<button onclick="removeNumber()">
제거
</button>

</div>


<div class="result" id="result">

x + 3 = 7

</div>


</div>



<script>


let leftNumber=3;
let rightNumber=7;
let removed=false;


function draw(){

if(!removed){

document.getElementById("left").innerHTML=
`
x + ${leftNumber}
`;

document.getElementById("right").innerHTML=
rightNumber;


}else{

document.getElementById("left").innerHTML=
"x";


document.getElementById("right").innerHTML=
rightNumber-leftNumber;

}

}



function removeNumber(){

let value=
Number(
document.getElementById("remove").value
);


if(value!==leftNumber){

alert("현재 추가된 숫자와 같은 값을 제거해야 합니다.");
return;

}


if(removed)return;


document.getElementById("left")
.classList.add("remove");


document.getElementById("right")
.classList.add("remove");



setTimeout(()=>{


removed=true;


document.getElementById("left")
.classList.remove("remove");


document.getElementById("right")
.classList.remove("remove");



draw();



document.getElementById("result")
.innerHTML=
`
x = ${rightNumber-leftNumber}
`;

},500);



}


draw();


</script>


</body>
</html>
