<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Desmos Lite v2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    height:100vh;
    overflow:hidden;
}


#container{
    display:flex;
    height:100vh;
}


/* LEFT */

#left{
    width:75%;
    display:flex;
    flex-direction:column;
}


/* TOP */

#topbar{

    background:#222;
    color:white;
    padding:12px;

}


#eq{

    width:420px;
    max-width:70%;

    padding:8px;
    font-size:16px;

}


button{

    padding:8px 14px;
    cursor:pointer;

}



/* CANVAS */

#canvasWrap{

    flex:1;
    position:relative;

}


canvas{

    width:100%;
    height:100%;
    display:block;

    background:white;

    cursor:grab;

}


canvas:active{

    cursor:grabbing;

}


/* GRAPH LIST */


#list{

    height:130px;

    overflow:auto;

    border-top:1px solid #ccc;

}


.graphItem{

    padding:8px;

    border-bottom:1px solid #ddd;

    display:flex;

    justify-content:space-between;

    align-items:center;

}


.graphColor{

    width:15px;
    height:15px;
    display:inline-block;

    margin-right:8px;

}


.delete{

    background:#e33;
    color:white;
    border:0;

}


/* INFO */

#info{

    background:#111;

    color:#0f0;

    height:70px;

    padding:10px;

    font-size:14px;

}


/* RIGHT */


#right{

    width:25%;

    background:#f5f5f5;

    padding:20px;

    overflow:auto;

}


h2{

    margin-top:0;

}


.card{

    background:white;

    padding:12px;

    border-radius:10px;

    margin-bottom:12px;

    box-shadow:0 2px 5px #ccc;

}


code{

    background:#eee;

    padding:3px;

}

</style>

</head>


<body>


<div id="container">


<div id="left">


<div id="topbar">

Equation:

<input id="eq"
placeholder="Example: y=sin(x), y=x^2, x=cos(y)">

<button onclick="addGraph()">
Add
</button>


</div>



<div id="canvasWrap">

<canvas id="canvas"></canvas>

</div>



<div id="info">

Ready

</div>



<div id="list">

</div>



</div>





<div id="right">


<h2>
Function Guide
</h2>


<div class="card">

<b>Linear</b>

<br>

<code>y=2x+1</code>

<br>

Straight line.

</div>



<div class="card">

<b>Square</b>

<br>

<code>y=x^2</code>

<br>

U shape parabola.

</div>



<div class="card">

<b>Sine</b>

<br>

<code>y=sin(x)</code>

<br>

Wave pattern.

</div>



<div class="card">

<b>Cosine</b>

<br>

<code>y=cos(x)</code>

<br>

Wave starting from top.

</div>



<div class="card">

<b>Tangent</b>

<br>

<code>y=tan(x)</code>

<br>

Repeating steep lines.

</div>



<div class="card">

<b>Other</b>

<br>

<code>sqrt(x)</code>

<br>

Square root.

<br><br>

<code>abs(x)</code>

<br>

Absolute value.

</div>



<div class="card">

Mouse:
<br>
Drag → move graph

<br>

Wheel → zoom

</div>



</div>


</div>



<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W,H;

function resize(){

    W = canvas.clientWidth;
    H = canvas.clientHeight;

    canvas.width = W;
    canvas.height = H;

    draw();

}

window.addEventListener("resize",resize);



/*
    Camera
*/

let scale = 60;

let offsetX = 0;
let offsetY = 0;



/*
    Graph data
*/

let graphs=[];

let graphId=1;


const colors=[
"#e53935",
"#1976d2",
"#43a047",
"#8e24aa",
"#fb8c00",
"#00838f"
];



/*
    Convert math input
*/

function prepareExpression(expr){

    expr = expr.trim();


    // remove spaces

    expr = expr.replace(/\s+/g,"");


    // x^2 -> x**2

    expr = expr.replace(/\^/g,"**");


    return expr;

}




/*
    Evaluate safely
*/

function evaluate(expr,scope){

    try{

        return math.evaluate(
            expr,
            scope
        );

    }
    catch(e){

        return NaN;

    }

}



/*
    Add graph
*/

function addGraph(){

    let input =
    document.getElementById("eq").value;


    if(!input)
        return;


    let graph={

        id:graphId++,

        expr:input,

        color:
        colors[graphs.length % colors.length]

    };


    graphs.push(graph);


    updateList();

    draw();


}




/*
    Delete graph
*/

function removeGraph(id){

    graphs =
    graphs.filter(
        g=>g.id!==id
    );


    updateList();

    draw();

}



/*
    Graph list UI
*/

function updateList(){

    let box =
    document.getElementById("list");


    box.innerHTML="";


    graphs.forEach(g=>{


        let div =
        document.createElement("div");


        div.className="graphItem";


        div.innerHTML=`

        <span>

        <span class="graphColor"
        style="background:${g.color}">
        </span>

        ${g.expr}

        </span>


        <button class="delete"
        onclick="removeGraph(${g.id})">

        X

        </button>

        `;


        box.appendChild(div);


    });


}



/*
    Coordinate conversion
*/


function screenToWorld(px,py){

    return {

        x:
        (px-W/2-offsetX)/scale,


        y:
        (H/2+offsetY-py)/scale

    };

}



function worldToScreen(x,y){

    return {

        x:
        W/2+offsetX+x*scale,


        y:
        H/2+offsetY-y*scale

    };

}



/*
    Axis
*/


function drawAxis(){

    ctx.strokeStyle="#bbb";

    ctx.lineWidth=1;


    ctx.beginPath();


    // x axis

    ctx.moveTo(
        0,
        H/2+offsetY
    );


    ctx.lineTo(
        W,
        H/2+offsetY
    );



    // y axis

    ctx.moveTo(
        W/2+offsetX,
        0
    );


    ctx.lineTo(
        W/2+offsetX,
        H
    );


    ctx.stroke();



    /*
        numbers
    */


    ctx.fillStyle="#555";

    ctx.font="12px Arial";


    let step=scale;


    for(
        let x=W/2+offsetX;
        x<W;
        x+=step
    ){

        let value=
        Math.round(
            (x-W/2-offsetX)/scale
        );


        ctx.fillText(
            value,
            x+3,
            H/2+offsetY+15
        );

    }


    for(
        let x=W/2+offsetX;
        x>0;
        x-=step
    ){

        let value=
        Math.round(
            (x-W/2-offsetX)/scale
        );


        ctx.fillText(
            value,
            x+3,
            H/2+offsetY+15
        );

    }


}





/*
    Draw y=f(x)
*/


function drawYFunction(expr,color){


    ctx.strokeStyle=color;

    ctx.lineWidth=2;

    ctx.beginPath();


    let first=true;



    for(
        let px=0;
        px<W;
        px+=2
    ){

        let pos=
        screenToWorld(
            px,
            0
        );


        let y=
        evaluate(
            expr,
            {
                x:pos.x
            }
        );


        if(
            Number.isFinite(y)
            &&
            Math.abs(y)<10000
        ){


            let screen=
            worldToScreen(
                pos.x,
                y
            );


            if(first){

                ctx.moveTo(
                    screen.x,
                    screen.y
                );

                first=false;

            }
            else{

                ctx.lineTo(
                    screen.x,
                    screen.y
                );

            }


        }

    }


    ctx.stroke();


}



/*
    Draw x=f(y)
*/


function drawXFunction(expr,color){


    ctx.strokeStyle=color;

    ctx.lineWidth=2;

    ctx.beginPath();


    let first=true;



    for(
        let py=0;
        py<H;
        py+=2
    ){


        let pos=
        screenToWorld(
            0,
            py
        );


        let x=
        evaluate(
            expr,
            {
                y:pos.y
            }
        );



        if(
            Number.isFinite(x)
            &&
            Math.abs(x)<10000
        ){


            let screen=
            worldToScreen(
                x,
                pos.y
            );



            if(first){

                ctx.moveTo(
                    screen.x,
                    screen.y
                );

                first=false;

            }
            else{

                ctx.lineTo(
                    screen.x,
                    screen.y
                );

            }


        }


    }


    ctx.stroke();


}




/*
    Main render
*/


function draw(){


    ctx.clearRect(
        0,
        0,
        W,
        H
    );


    drawAxis();


    for(let g of graphs){


        let exp =
        prepareExpression(
            g.expr
        );


        if(
            exp.startsWith("y=")
        ){

            drawYFunction(
                exp.substring(2),
                g.color
            );

        }


        else if(
            exp.startsWith("x=")
        ){

            drawXFunction(
                exp.substring(2),
                g.color
            );

        }


    }



    document.getElementById("info").innerHTML=
    "Graphs: "+graphs.length+
    " | Scale: "+scale.toFixed(1);


}



resize();
/*
    Mouse Drag
*/

let dragging=false;

let lastX=0;
let lastY=0;


canvas.addEventListener(
"mousedown",
e=>{

    dragging=true;

    lastX=e.clientX;
    lastY=e.clientY;

});



window.addEventListener(
"mouseup",
()=>{

    dragging=false;

});



window.addEventListener(
"mousemove",
e=>{


    if(!dragging)
        return;


    let dx =
    e.clientX-lastX;


    let dy =
    e.clientY-lastY;



    offsetX += dx;

    offsetY += dy;



    lastX=e.clientX;

    lastY=e.clientY;


    draw();


});





/*
    Zoom
*/


canvas.addEventListener(
"wheel",
e=>{


    e.preventDefault();


    let before =
    scale;



    if(e.deltaY<0){

        scale*=1.1;

    }
    else{

        scale/=1.1;

    }



    // limit

    scale =
    Math.max(
        10,
        Math.min(
            scale,
            500
        )
    );



    /*
       Keep mouse position
    */


    let rect =
    canvas.getBoundingClientRect();


    let mx =
    e.clientX-rect.left;


    let my =
    e.clientY-rect.top;



    let worldBefore =
    screenToWorld(
        mx,
        my
    );



    let worldAfter =
    screenToWorld(
        mx,
        my
    );



    offsetX +=
    (worldAfter.x-worldBefore.x)
    *
    scale;



    offsetY +=
    (worldAfter.y-worldBefore.y)
    *
    scale;



    draw();


},
{
    passive:false
});





/*
    Enter key
*/


document
.getElementById("eq")
.addEventListener(
"keydown",
e=>{


    if(e.key==="Enter"){

        addGraph();

    }


});





/*
    Better error display
*/


function checkExpression(){

    for(let g of graphs){


        let exp =
        prepareExpression(
            g.expr
        );


        if(
            !exp.includes("=")
        ){

            return "⚠ Use y= or x=";

        }

    }


    return "Ready";

}



setInterval(()=>{


    let info =
    document.getElementById("info");


    if(graphs.length===0){

        info.innerHTML=
        "Enter an equation.";

    }
    else{

        info.innerHTML=
        "Graphs: "
        +
        graphs.length
        +
        " | Zoom: "
        +
        scale.toFixed(1);

    }



},500);
</script>


</body>
</html>
