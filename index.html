<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>그래프 계산기</title>
</head>

<body style="display:flex; gap:20px;">

<!-- ===== 왼쪽: 그래프 영역 ===== -->
<div>

<h2>📈 그래프 계산기</h2>

<input id="graphInput" placeholder="y=sin(x)">
<button onclick="addGraph()">추가</button>

<p id="coord">(x, y)</p>

<svg id="graphSVG" width="700" height="450" style="border:1px solid #ccc;"></svg>

<div id="graphList"></div>

</div>


<!-- ===== 오른쪽: 사용법 ===== -->
<div style="width:250px; font-size:14px;">

<h3>📘 사용법</h3>

<p>
✔ 기본<br>
y=2x+3<br>
y=x^2<br>
</p>

<p>
✔ 제곱<br>
x^2 또는 xx<br>
x^3 또는 xxx<br>
</p>

<p>
✔ 함수<br>
sin(x), cos(x), tan(x)<br>
sqrt(x), log(x), abs(x)<br>
</p>

<p>
✔ 팁<br>
- 여러 그래프 가능<br>
- 삭제 버튼으로 제거<br>
- 마우스로 좌표 확인<br>
</p>

</div>


<script>

const svg = document.getElementById("graphSVG");
const listDiv = document.getElementById("graphList");

const W = 700;
const H = 450;

let scale = 40;

let graphs = [];


// ===== 좌표 표시 =====
svg.addEventListener("mousemove", e=>{
    const rect = svg.getBoundingClientRect();

    let x = (e.clientX - rect.left - W/2) / scale;
    let y = (H/2 - (e.clientY - rect.top)) / scale;

    coord.innerText = `(${x.toFixed(2)}, ${y.toFixed(2)})`;
});


// ===== 수식 변환 =====
function convert(expr){
    return expr
        .replace("y=","")
        .replace(/\s/g,"")
        .replace(/\^/g,"**")
        .replace(/x{2,}/g,m=>m.split("").join("*"))
        .replace(/(\d)x/g,"$1*x")
        .replace(/x(\d)/g,"x*$1")
        .replace(/\)x/g,")*x")
        .replace(/x\(/g,"x*(")
        .replace(/\)\(/g,")*(")
        .replace(/sin/g,"Math.sin")
        .replace(/cos/g,"Math.cos")
        .replace(/tan/g,"Math.tan")
        .replace(/log/g,"Math.log")
        .replace(/sqrt/g,"Math.sqrt")
        .replace(/abs/g,"Math.abs");
}


// ===== 그래프 추가 =====
function addGraph(){

    let input = document.getElementById("graphInput").value;
    if(!input) return;

    let expr = convert(input);

    let f;

    try{
        f = new Function("x", "return " + expr);
    }catch{
        alert("식 오류");
        return;
    }

    graphs.push({expr: input, f});

    renderList();
    drawAll();
}


// ===== 삭제 =====
function removeGraph(i){
    graphs.splice(i,1);
    renderList();
    drawAll();
}


// ===== 리스트 UI =====
function renderList(){

    listDiv.innerHTML = "";

    graphs.forEach((g,i)=>{

        listDiv.innerHTML += `
        <div>
        ${i+1}. ${g.expr}
        <button onclick="removeGraph(${i})">삭제</button>
        </div>
        `;
    });
}


// ===== 그리드 =====
function drawGrid(){

    let g = "";

    for(let i=-10;i<=10;i++){
        let x = W/2 + i*scale;
        let y = H/2 - i*scale;

        g += `<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="#eee"/>`;
        g += `<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="#eee"/>`;

        if(i!==0){
            g += `<text x="${x+2}" y="${H/2+12}" font-size="10">${i}</text>`;
            g += `<text x="${W/2+5}" y="${y-2}" font-size="10">${i}</text>`;
        }
    }

    g += `
    <line x1="${W/2}" y1="0" x2="${W/2}" y2="${H}" stroke="black"/>
    <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="black"/>
    `;

    return g;
}


// ===== 색상 =====
const colors = ["red","blue","green","purple","orange","brown"];


// ===== 전체 그리기 =====
function drawAll(){

    svg.innerHTML = drawGrid();

    graphs.forEach((g,gi)=>{

        let points = "";

        for(let x=-10;x<=10;x+=0.05){

            let y = g.f(x);

            if(isFinite(y)){
                let sx = W/2 + x*scale;
                let sy = H/2 - y*scale;

                points += `${sx},${sy} `;
            }
        }

        svg.innerHTML += `
        <polyline points="${points}"
        stroke="${colors[gi%colors.length]}"
        fill="none"
        stroke-width="2"/>
        `;

        // 점 3개
        [-5,0,5].forEach(x=>{
            let y = g.f(x);
            if(!isFinite(y)) return;

            let sx = W/2 + x*scale;
            let sy = H/2 - y*scale;

            svg.innerHTML += `
            <circle cx="${sx}" cy="${sy}" r="4"
            fill="${colors[gi%colors.length]}"/>
            `;
        });

    });
}


// 엔터
graphInput.addEventListener("keydown", e=>{
    if(e.key==="Enter") addGraph();
});

</script>

</body>
</html>
