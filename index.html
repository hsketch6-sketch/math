<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>그래프</title>
</head>

<body>

<h2>📈 그래프</h2>

<p>
※ 입력 규칙<br>
- xx = x²<br>
- xxx = x³<br>
- xxxx = x⁴
</p>

<input id="graphInput" value="y=xx">
<button onclick="drawGraph()">그리기</button>

<br><br>

<svg id="graphSVG" width="600" height="400" style="border:1px solid #ccc;"></svg>

<script>

function drawGraph(){

    const svg = document.getElementById("graphSVG");
    svg.innerHTML = "";

    const W = 600;
    const H = 400;
    const scale = 30;

    let input = document.getElementById("graphInput").value;

    // ===== x 거듭제곱 처리 =====
    let expr = input.replace("y=","");

    expr = expr.replace(/x{2,}/g, (match)=>{
        return match.split("").join("*");
    });

    let f;

    try{
        f = new Function("x", "return " + expr);
    }catch{
        alert("식 오류");
        return;
    }

    // ===== 축 =====
    svg.innerHTML += `
    <line x1="${W/2}" y1="0" x2="${W/2}" y2="${H}" stroke="black"/>
    <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="black"/>
    `;

    // ===== 그래프 선 =====
    let points = "";

    for(let x=-10; x<=10; x+=0.05){

        let y = f(x);

        if(!isFinite(y)) continue;

        let sx = W/2 + x*scale;
        let sy = H/2 - y*scale;

        points += `${sx},${sy} `;
    }

    svg.innerHTML += `
    <polyline
    points="${points}"
    stroke="red"
    fill="none"
    stroke-width="2"
    />
    `;

    // ===== 점 3개 =====
    let xs = [-5, 0, 5];

    xs.forEach(x=>{

        let y = f(x);
        if(!isFinite(y)) return;

        let sx = W/2 + x*scale;
        let sy = H/2 - y*scale;

        svg.innerHTML += `
        <circle cx="${sx}" cy="${sy}" r="4" fill="blue"/>
        <text x="${sx+5}" y="${sy-5}" font-size="10">
        (${x}, ${y.toFixed(1)})
        </text>
        `;
    });

    // ===== 직사각형 =====
    let x1 = -2;
    let x2 = 2;

    let y1 = f(x1);
    let y2 = f(x2);

    if(isFinite(y1) && isFinite(y2)){

        let sx1 = W/2 + x1*scale;
        let sy1 = H/2 - y1*scale;

        let sx2 = W/2 + x2*scale;
        let sy2 = H/2 - y2*scale;

        svg.innerHTML += `
        <rect
        x="${sx1}"
        y="${sy2}"
        width="${sx2 - sx1}"
        height="${sy1 - sy2}"
        fill="green"
        opacity="0.2"
        />
        `;
    }
}

// 처음 실행
drawGraph();

</script>

</body>
</html>
