<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>그래프 계산기</title>
<style>
body { font-family: sans-serif; }

#top { display:flex; }
#left { width:70%; }
#right { width:30%; padding:10px; background:#f5f5f5; }

canvas { border:1px solid black; cursor:crosshair; }

.graphItem {
    background:#eee;
    margin:5px;
    padding:5px;
}

#info {
    margin-top:10px;
    padding:10px;
    background:#222;
    color:#0f0;
    min-height:50px;
}
</style>
</head>
<body>

<div id="top">
<div id="left">
<h2>📈 그래프 계산기</h2>

<input id="input" placeholder="y=2x+1">
<button onclick="addGraph()">추가</button>

<canvas id="canvas" width="800" height="500"></canvas>

<div id="info">👉 그래프 클릭하면 좌표 & 설명 표시됨</div>

<h3>📊 그래프 목록</h3>
<div id="list"></div>

</div>

<div id="right">
<h3>📘 사용법</h3>
<pre>
^ 사용 가능
xx = x^2
xxx = x^3

sin cos tan log sqrt abs

예:
y=2x+1
y=xx
y=1/x
y=sin(x)
</pre>

<h3>📚 설명</h3>
<pre>
y=ax → 정비례
y=ax+b → 직선
y=ax^2 → 포물선
y=1/x → 반비례
y=sin(x) → 사인함수
</pre>
</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let graphs=[];
let id=0;

let scale=40;
let originX=canvas.width/2;
let originY=canvas.height/2;

function transform(input){
    return input
        .replace("y=","")
        .replace(/\s/g,"")
        .replace(/x{2,}/g,m=>m.split("").join("*"))
        .replace(/\^/g,"**")
        .replace(/(\d)x/g,"$1*x")
        .replace(/x(\d)/g,"x*$1")
        .replace(/sin/g,"Math.sin")
        .replace(/cos/g,"Math.cos")
        .replace(/tan/g,"Math.tan")
        .replace(/log/g,"Math.log")
        .replace(/sqrt/g,"Math.sqrt")
        .replace(/abs/g,"Math.abs")
        .replace(/e/g,"Math.E");
}

function getDesc(expr, input){
    let t=input.toLowerCase();

    if(t.includes("sin")) return "사인 함수 (주기적)";
    if(t.includes("cos")) return "코사인 함수";
    if(t.includes("tan")) return "탄젠트 (점근선)";
    if(t.includes("1/x")) return "반비례 그래프";
    if(t.includes("log")) return "로그 함수";
    if(t.includes("sqrt")) return "루트 함수";
    if(t.includes("abs")) return "절댓값 함수";

    if(t.match(/x\^?2|xx/)) return "이차함수 (포물선)";
    if(t.match(/x\^?3|xxx/)) return "삼차함수";

    if(t.match(/y=\d*x$/)) return "정비례";
    if(t.match(/y=\d*x\+\d+/)) return "일차함수";

    return "일반 함수";
}

function addGraph(){
    let input=document.getElementById("input").value;
    if(!input) return;

    let expr=transform(input);

    let f;
    try{
        f=new Function("x","return "+expr);
        f(1);
    }catch{
        alert("수식 오류");
        return;
    }

    let color=`hsl(${Math.random()*360},70%,50%)`;

    graphs.push({id,f,expr,input,color});

    let div=document.createElement("div");
    div.className="graphItem";
    div.id="g"+id;

    div.innerHTML=`
    <b>#${id}</b> ${input}
    <br>${getDesc(expr,input)}
    <br>
    <button onclick="removeGraph(${id})">삭제</button>
    `;

    document.getElementById("list").appendChild(div);

    id++;
}

function removeGraph(i){
    graphs=graphs.filter(g=>g.id!==i);
    document.getElementById("g"+i).remove();
}

function drawAxes(){
    ctx.beginPath();
    ctx.moveTo(0,originY);
    ctx.lineTo(canvas.width,originY);
    ctx.moveTo(originX,0);
    ctx.lineTo(originX,canvas.height);
    ctx.stroke();
}

function drawGraphs(){
    graphs.forEach(g=>{
        ctx.strokeStyle=g.color;
        ctx.beginPath();

        let prev=false;

        for(let i=0;i<canvas.width;i++){
            let x=(i-originX)/scale;
            let y;

            try{y=g.f(x);}catch{prev=false;continue;}

            if(!isFinite(y)||Math.abs(y)>1000){
                prev=false;
                continue;
            }

            let py=originY-y*scale;

            if(!prev){
                ctx.moveTo(i,py);
                prev=true;
            }else{
                ctx.lineTo(i,py);
            }
        }

        ctx.stroke();
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawAxes();
    drawGraphs();
}

function loop(){
    draw();
    requestAnimationFrame(loop);
}
loop();

canvas.addEventListener("click", function(e){
    let rect=canvas.getBoundingClientRect();

    let px=e.clientX-rect.left;
    let py=e.clientY-rect.top;

    let x=(px-originX)/scale;
    let y=(originY-py)/scale;

    let text=`좌표: (${x.toFixed(3)}, ${y.toFixed(3)})<br>`;

    graphs.forEach(g=>{
        let fy;
        try{fy=g.f(x);}catch{return;}

        if(isFinite(fy)){
            text+=`#${g.id} ${g.input} → y=${fy.toFixed(3)} (${getDesc(g.expr,g.input)})<br>`;
        }
    });

    document.getElementById("info").innerHTML=text;
});
</script>

</body>
</html>
