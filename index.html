<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Graph Calculator</title>

<style>

*{
box-sizing:border-box;
}

html,body{

margin:0;
width:100%;
height:100%;

overflow:hidden;

font-family:Arial,sans-serif;

}


#container{

display:flex;

width:100vw;
height:100vh;

}


/* LEFT */

#left{

width:72%;

display:flex;
flex-direction:column;

min-height:0;

}


/* TOP */

#topbar{

background:#222;
color:white;

padding:12px;

flex-shrink:0;

}


#input{

width:300px;

padding:8px;

font-size:16px;

}


button,select{

padding:7px 12px;

cursor:pointer;

}



/* CANVAS */

#canvasWrap{

flex:1;

min-height:0;

}


canvas{

width:100%;
height:100%;

display:block;

background:white;

cursor:grab;

}


canvas:active{

cursor:grabbing;

}



/* INFO */

#info{

height:90px;

background:#111;

color:#0f0;

padding:10px;

white-space:pre-line;

overflow:auto;

}



/* LIST */

#list{

height:180px;

overflow:auto;

border-top:1px solid #ccc;

}


.graphItem{

padding:10px;

border-bottom:1px solid #ddd;

}


.conceptBox{

margin-top:10px;

padding:10px;

background:#eee;

border-radius:8px;

line-height:1.5;

}



/* RIGHT */

#right{

width:28%;

background:#f4f4f4;

padding:15px;

overflow:auto;

}


.card{

background:white;

padding:15px;

border-radius:12px;

margin-bottom:15px;

}


</style>

</head>



<body>


<div id="container">


<div id="left">


<div id="topbar">


<span id="title">
📈 Graph Calculator
</span>


<br><br>


<input
id="input"
placeholder="Example: y=2x+1">


<button id="addBtn">
Add
</button>



<select id="language">

<option value="en">
English
</option>

<option value="ko">
한국어
</option>

</select>


</div>




<div id="canvasWrap">

<canvas id="canvas"></canvas>

</div>



<div id="info">

Click graph to check value.

</div>



<div id="list">

</div>


</div>




<div id="right">


<h2 id="guideTitle">

📘 Guide

</h2>


<div class="card">

<b id="exampleTitle">

Input Examples

</b>

<br><br>


<div id="examples">

y=x+2
<br>
y=x²
<br>
y=sin(x)
<br>
y=1/x
<br>
y=sqrt(x)

</div>


</div>




<div class="card">


<b id="controlTitle">

Controls

</b>


<br><br>


🖱
<span id="dragText">
Drag
</span>

<br>

<span id="moveText">
Move graph
</span>


<br><br>


🖱
<span id="wheelText">
Wheel
</span>

<br>

<span id="zoomText">
Zoom
</span>


<br><br>


<span id="clickText">
Click graph to check value.
</span>


</div>




<div class="card">


<b id="functionTitle">

Functions

</b>


<br><br>


sin(x)
→
<span id="waveText">
Wave
</span>


<br><br>

cos(x)

<br><br>

tan(x)

<br><br>

sqrt(x)

<br><br>

abs(x)

<br><br>

log(x)


</div>


</div>


</div>



<script>


/* =========================
 LANGUAGE SYSTEM
========================= */


let currentLanguage="en";


const LANG={


en:{


title:"📈 Graph Calculator",

add:"Add",

guide:"📘 Guide",

example:"Input Examples",

control:"Controls",

drag:"Drag",

move:"Move graph",

wheel:"Wheel",

zoom:"Zoom",

click:"Click graph to check value.",

function:"Functions",

wave:"Wave",

explain:"Explain",

delete:"Delete",

invalid:"Invalid equation"

},



ko:{


title:"📈 그래프 계산기",

add:"추가",

guide:"📘 사용 설명",

example:"입력 예시",

control:"조작 방법",

drag:"드래그",

move:"그래프 이동",

wheel:"마우스 휠",

zoom:"확대 / 축소",

click:"그래프를 클릭하면 값을 확인합니다.",

function:"함수",

wave:"파동",

explain:"설명",

delete:"삭제",

invalid:"올바르지 않은 식입니다."

}


};





function applyLanguage(){


let l=LANG[currentLanguage];


document.getElementById("title").innerText=l.title;

document.getElementById("addBtn").innerText=l.add;

document.getElementById("guideTitle").innerText=l.guide;

document.getElementById("exampleTitle").innerText=l.example;

document.getElementById("controlTitle").innerText=l.control;

document.getElementById("dragText").innerText=l.drag;

document.getElementById("moveText").innerText=l.move;

document.getElementById("wheelText").innerText=l.wheel;

document.getElementById("zoomText").innerText=l.zoom;

document.getElementById("clickText").innerText=l.click;

document.getElementById("functionTitle").innerText=l.function;

document.getElementById("waveText").innerText=l.wave;


document.getElementById("input").placeholder =
currentLanguage==="ko"
?
"예: y=2x+1"
:
"Example: y=2x+1";


}



document
.getElementById("language")
.addEventListener(
"change",
e=>{

currentLanguage=e.target.value;

applyLanguage();


});


/* =========================
 GRAPH ENGINE
========================= */


const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");


let graphs=[];
let graphID=0;


let scale=50;

let originX=0;
let originY=0;



/* =========================
 RESIZE
========================= */


function resizeCanvas(){

canvas.width=canvas.clientWidth;
canvas.height=canvas.clientHeight;


if(originX===0){

originX=canvas.width/2;
originY=canvas.height/2;

}


draw();

}


window.addEventListener(
"resize",
resizeCanvas
);





/* =========================
 FUNCTION CONVERTER
========================= */


function transform(input){


let expr=input
.toLowerCase()
.replace(/^y=/,"")
.replace(/\s/g,"");



/* powers */

expr=expr.replace(
/x²/g,
"x^2"
);


expr=expr.replace(
/x³/g,
"x^3"
);



expr=expr.replace(
/\^/g,
"**"
);



/* multiplication */

expr=expr.replace(
/(\d+)x/g,
"$1*x"
);


expr=expr.replace(
/x\(/g,
"x*("
);



/* functions */


let funcs=[

"sin",
"cos",
"tan",
"sqrt",
"abs",
"log",
"exp",
"floor",
"ceil",
"round",
"asin",
"acos",
"atan"

];


funcs.forEach(f=>{

expr=expr.replace(
new RegExp(f,"g"),
"Math."+f
);

});


return expr;


}







/* =========================
 ADD GRAPH
========================= */


function addGraph(){


let input=
document.getElementById("input").value;


if(!input)
return;



let expr=
transform(input);



let func;


try{


func=new Function(
"x",
"return "+expr
);


let test=func(1);


if(typeof test!=="number"
&&
!Number.isNaN(test)
)
throw Error();


}

catch{


alert(
LANG[currentLanguage].invalid
);

return;

}




let id=graphID;


graphs.push({

id:id,

input:input,

f:func,

color:
`hsl(${id*80%360},70%,50%)`

});



createGraphItem(
id,
input
);



graphID++;


document.getElementById("input").value="";


draw();


}



document
.getElementById("addBtn")
.onclick=addGraph;






/* =========================
 GRAPH LIST
========================= */


function createGraphItem(id,input){


let div=document.createElement("div");


div.className="graphItem";


div.id="graph"+id;



div.innerHTML=`

<b>
#${id}
</b>

${input}

<br><br>

<button onclick="removeGraph(${id})">

❌

</button>

`;



document
.getElementById("list")
.appendChild(div);


}




function removeGraph(id){


graphs=
graphs.filter(
g=>g.id!==id
);


let item=
document.getElementById(
"graph"+id
);


if(item)
item.remove();


draw();


}







/* =========================
 COORDINATE
========================= */


function worldX(px){

return(
px-originX
)/scale;

}


function worldY(py){

return(
originY-py
)/scale;

}








/* =========================
 AXIS
========================= */


function drawAxis(){


ctx.strokeStyle="#ccc";

ctx.lineWidth=1;


ctx.beginPath();


ctx.moveTo(
0,
originY
);


ctx.lineTo(
canvas.width,
originY
);



ctx.moveTo(
originX,
0
);


ctx.lineTo(
originX,
canvas.height
);


ctx.stroke();



ctx.fillStyle="#555";

ctx.font="12px Arial";


for(
let i=-50;
i<=50;
i++
){


let x=
originX+i*scale;


let y=
originY-i*scale;


if(
x>0 &&
x<canvas.width
)

ctx.fillText(
i,
x,
originY+15
);



if(
y>0 &&
y<canvas.height
)

ctx.fillText(
i,
originX+5,
y
);


}


}






/* =========================
 DRAW GRAPH
========================= */


function drawGraphs(){


graphs.forEach(g=>{


ctx.strokeStyle=g.color;

ctx.lineWidth=2;


ctx.beginPath();



let started=false;



for(
let px=0;
px<canvas.width;
px+=2
){


let x=
worldX(px);


let y;


try{

y=g.f(x);

}

catch{

started=false;
continue;

}




if(
!Number.isFinite(y)
||
Math.abs(y)>10000
){

started=false;
continue;

}



let py=
originY-y*scale;



if(!started){

ctx.moveTo(
px,
py
);

started=true;

}

else{

ctx.lineTo(
px,
py
);

}



}



ctx.stroke();

/* ⭐ x = -1, 0, 1 점 찍기 */
let xs = [-1, 0, 1];

xs.forEach(x=>{
  let y;

  try{
    y = g.f(x);
  }catch{
    return;
  }

  if(!Number.isFinite(y)) return;

  let px = originX + x * scale;
  let py = originY - y * scale;

  // 색 설정
  ctx.fillStyle = g.color;

  // 원점 강조
  if(Math.abs(x) < 0.0001){
    ctx.fillStyle = "red";
  }

  ctx.beginPath();
  ctx.arc(px, py, 5, 0, Math.PI*2);
  ctx.fill();

  // 좌표 표시
  ctx.fillText(`(${x}, ${y.toFixed(2)})`, px+6, py-6);
});








/* =========================
 DRAW
========================= */


function draw(){


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);


drawAxis();

drawGraphs();


}







/* =========================
 DRAG
========================= */


let dragging=false;

let lastX=0;
let lastY=0;



canvas.addEventListener(
"mousedown",
e=>{

dragging=true;

lastX=e.clientX;
lastY=e.clientY;

});



window.addEventListener(
"mouseup",
()=>{

dragging=false;

});



window.addEventListener(
"mousemove",
e=>{


if(!dragging)
return;


originX+=
e.clientX-lastX;


originY+=
e.clientY-lastY;



lastX=e.clientX;
lastY=e.clientY;


draw();


});







/* =========================
 ZOOM
========================= */


canvas.addEventListener(
"wheel",
e=>{


e.preventDefault();


let old=scale;


if(e.deltaY<0)
scale*=1.1;

else
scale/=1.1;



scale=Math.max(
10,
Math.min(
300,
scale
)
);



let mx=e.offsetX;
let my=e.offsetY;



originX=
mx-
(mx-originX)
*
(scale/old);



originY=
my-
(my-originY)
*
(scale/old);



draw();


},
{
passive:false
}

);






/* =========================
 CLICK VALUE
========================= */


canvas.addEventListener(
"click",
e=>{


let x=
worldX(e.offsetX);



let text=
"x = "
+x.toFixed(3)
+"\n\n";



graphs.forEach(g=>{


let y;


try{

y=g.f(x);

}

catch{

return;

}



if(Number.isFinite(y)){


text+=
g.input
+"\n";


text+=
"y = "
+y.toFixed(4)
+"\n\n";


}


});



document
.getElementById("info")
.innerText=text;



});





resizeCanvas();
 /* =========================
 CONCEPT DATABASE
========================= */


const concepts={


linear:{

title:{
en:"Linear Function",
ko:"일차함수"
},

shape:{
en:"A straight line graph.",
ko:"직선으로 나타나는 그래프입니다."
},

info:{

en:[
"Form: y=ax+b",
"The slope controls direction.",
"Change rate is constant."
],

ko:[
"형태: y=ax+b",
"기울기가 방향을 결정합니다.",
"변화율이 일정합니다."
]

}

},



quadratic:{

title:{
en:"Quadratic Function",
ko:"이차함수"
},

shape:{
en:"A parabola curve.",
ko:"포물선 모양입니다."
},

info:{

en:[
"Contains x².",
"Has a vertex.",
"Has symmetry."
],

ko:[
"x² 항을 포함합니다.",
"꼭짓점을 가집니다.",
"대칭축이 있습니다."
]

}

},



sin:{

title:{
en:"Sine Function",
ko:"사인 함수"
},

shape:{
en:"A repeating wave.",
ko:"반복되는 파동 그래프입니다."
},

info:{

en:[
"Periodic function.",
"Range is -1 to 1."
],

ko:[
"주기 함수입니다.",
"기본 범위는 -1~1입니다."
]

}

},



circle:{

title:{
en:"Circle",
ko:"원"
},

shape:{
en:"A closed round curve.",
ko:"닫힌 원형 그래프입니다."
},

info:{

en:[
"Equation: x²+y²=r²",
"All points are same distance from center."
],

ko:[
"식: x²+y²=r²",
"중심에서 같은 거리에 있는 점들의 모임입니다."
]

}

},



inverse:{

title:{
en:"Inverse Proportion",
ko:"반비례"
},

shape:{
en:"Two separated curves.",
ko:"서로 떨어진 두 곡선입니다."
},

info:{

en:[
"Form: y=a/x",
"x*y is constant."
],

ko:[
"형태: y=a/x",
"x와 y의 곱이 일정합니다."
]

}

}


};







/* =========================
 FIND CONCEPT
========================= */


function getConcept(input){


let t=input
.toLowerCase();



if(
t.includes("sin")
)

return concepts.sin;



if(
t.includes("x²+y²")
||
(
t.includes("x^2+y^2")
)
)

return concepts.circle;



if(
t.includes("/x")
||
t.includes("1/x")
)

return concepts.inverse;



if(
t.includes("x²")
||
t.includes("x^2")
)

return concepts.quadratic;



return concepts.linear;


}







/* =========================
 UPDATE GRAPH LIST
========================= */


function createGraphItem(id,input){


let c=getConcept(input);



let div=
document.getElementById(
"graph"+id
);



if(div)
div.remove();



div=document.createElement("div");


div.className="graphItem";

div.id="graph"+id;



let lang=currentLanguage;



div.innerHTML=`

<b>
#${id}
</b>

${input}

<br>


<small>

${c.title[lang]}

</small>


<br><br>


<button onclick="showConcept(${id})">

${LANG[lang].explain}

</button>


<button onclick="removeGraph(${id})">

❌

</button>


<div
id="concept${id}"
class="conceptBox"
style="display:none">

<b>

${c.title[lang]}

</b>


<br><br>


${c.shape[lang]}


<br><br>


${
c.info[lang]
.map(x=>"• "+x)
.join("<br>")
}


</div>


`;



document
.getElementById("list")
.appendChild(div);


}






function showConcept(id){


let box=
document.getElementById(
"concept"+id
);


box.style.display=
box.style.display==="none"
?
"block"
:
"none";


}







/* =========================
 LANGUAGE REFRESH
========================= */


function changeLanguage(){


currentLanguage=
document
.getElementById("language")
.value;



applyLanguage();



document
.getElementById("list")
.innerHTML="";



graphs.forEach(g=>{

createGraphItem(
g.id,
g.input
);


});


}






/* =========================
 ENTER KEY
========================= */


document
.getElementById("input")
.addEventListener(
"keydown",
e=>{


if(e.key==="Enter")
addGraph();


});

</script>


</body>

</html>
