<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>수학 개념 시각화</title>


<style>

body{

font-family:Arial,sans-serif;
background:#f3f6ff;
padding:30px;

}


.box{

max-width:950px;
margin:auto;

background:white;

padding:30px;

border-radius:25px;

text-align:center;

box-shadow:0 10px 30px #ddd;

}



button,input{

font-size:18px;

padding:10px;

margin:5px;

border-radius:10px;

}



button{

background:#4b7bec;

color:white;

border:0;

cursor:pointer;

}



.menu button{

width:200px;

}


.hidden{

display:none;

}



/* 저울 */


.balance{

display:flex;

justify-content:center;

align-items:center;

gap:40px;

margin:50px;

}


.side{

width:280px;

min-height:160px;

border:5px solid #555;

border-radius:20px;


display:flex;

flex-direction:column;

justify-content:center;

align-items:center;


font-size:30px;

background:#fafafa;

}



.equal{

font-size:60px;

}



.block{

display:inline-block;

background:#4b7bec;

color:white;

padding:5px 10px;

margin:3px;

border-radius:8px;

}



.move{

animation:move .8s;

}



.shake{

animation:shake .5s;

}



@keyframes move{


50%{

transform:translateY(-40px);

}

}



@keyframes shake{


25%{

transform:rotate(5deg);

}


50%{

transform:rotate(-5deg);

}


75%{

transform:rotate(5deg);

}

}



.info{

font-size:24px;

margin:20px;

}



/* 그래프 */


svg{

background:#fafafa;

border:3px solid #555;

border-radius:15px;

}



.line{

stroke:#4b7bec;

stroke-width:4;

stroke-dasharray:1000;

stroke-dashoffset:1000;

animation:draw 2s forwards;

}



.point{

fill:#ff4757;

}



@keyframes draw{

to{

stroke-dashoffset:0;

}

}


</style>

</head>



<body>


<div class="box">


<h1>📚 수학 개념 시각화</h1>


<div class="menu">


<button onclick="show('balance')">

⚖ 방정식 저울

</button>


<button onclick="show('graph')">

📈 함수 그래프

</button>


</div>

<hr>





<!-- 저울 -->


<div id="balance">


<h2>⚖ 방정식 저울</h2>


<input id="eq"

value="x+3=7">


<button onclick="loadEquation()">

식 만들기

</button>



<div class="balance">


<div class="side" id="left">

</div>


<div class="equal">

=

</div>


<div class="side" id="right">

</div>


</div>



<div>


양변에 적용할 수


<input id="num"

type="number"

value="3">



<button onclick="operation(-1)">

- 적용

</button>


<button onclick="operation(1)">

+ 적용

</button>


</div>



<div class="info" id="balanceInfo">

</div>


</div>






<!-- 그래프 -->


<div id="graph" class="hidden">


<h2>📈 함수 그래프</h2>


<input id="func"

value="y=3x">



<button onclick="drawGraph()">

그래프 생성

</button>



<br><br>


<svg id="svgGraph"

width="700"

height="500">

</svg>



<div class="info" id="graphInfo">

</div>


</div>


</div>
