<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ultimate Graph Calculator</title>

<style>
body{
    margin:0;
    display:flex;
    flex-direction:column;
    height:100vh;
}

#topbar{
    background:#111;
    color:white;
    padding:10px;
}

#canvasWrap{
    flex:1;
    position:relative;
    overflow:hidden;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<div id="topbar">
    Ultimate Graph Calculator
</div>

<div id="canvasWrap">
    <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let originX, originY;
let scale = 50;

// ✅ 캔버스 크기 동기화 (핵심)
function resizeCanvas(){
    const rect = canvas.parentElement.getBoundingClientRect();

    canvas.width = rect.width;
    canvas.height = rect.height;

    originX = canvas.width / 2;
    originY = canvas.height / 2;

    draw();
}

window.addEventListener("resize", resizeCanvas);

// 좌표 변환
function toScreenX(x){
    return originX + x * scale;
}
function toScreenY(y){
    return originY - y * scale;
}

// 축 그리기
function drawAxis(){
    ctx.strokeStyle = "#888";
    ctx.lineWidth = 1;

    // x축
    ctx.beginPath();
    ctx.moveTo(0, originY);
    ctx.lineTo(canvas.width, originY);
    ctx.stroke();

    // y축
    ctx.beginPath();
    ctx.moveTo(originX, 0);
    ctx.lineTo(originX, canvas.height);
    ctx.stroke();
}

// 그래프
function drawGraph(){
    ctx.strokeStyle = "orange";
    ctx.lineWidth = 2;

    ctx.beginPath();

    let first = true;

    for(let px=0; px<canvas.width; px++){
        let x = (px - originX) / scale;
        let y = 3 * x; // 테스트 함수

        let py = toScreenY(y);

        if(first){
            ctx.moveTo(px, py);
            first = false;
        }else{
            ctx.lineTo(px, py);
        }
    }

    ctx.stroke();
}

// 전체 draw
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawAxis();
    drawGraph();
}

// 초기 실행
resizeCanvas();
</script>

</body>
</html>
