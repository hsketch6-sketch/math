<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Graph</title>
<style>
body { margin:0; font-family:sans-serif; }
#container { display:flex; height:100vh; }

#left { width:70%; display:flex; flex-direction:column; }
#topbar { background:#222; color:white; padding:10px; }
#canvasWrap { flex:1; }
canvas { width:100%; height:100%; background:white; }

#info { height:120px; overflow:auto; background:#111; color:#0f0; padding:10px; }
#list { height:150px; overflow:auto; border-top:1px solid #ccc; }

#right { width:30%; padding:15px; background:#f4f4f4; overflow:auto; }
</style>
</head>
<body>

<div id="container">

<div id="left">
<div id="topbar">
<input id="expr" placeholder="y=sin(x)/sin(x^2)">
<button onclick="draw()">Draw</button>
</div>

<div id="canvasWrap">
<canvas id="cv"></canvas>
</div>

<div id="info" id="log"></div>
<div id="list"></div>
</div>

<div id="right">
<h3>Functions Guide</h3>
<p><b>Supported:</b></p>
<ul>
<li>y = f(x)</li>
<li>x = f(y)</li>
<li>y = f(x,y)</li>
</ul>

<p><b>Examples:</b></p>
<ul>
<li>y=sin(x)/sin(x^2)</li>
<li>x=tan(y)</li>
<li>y=tan(x*y)</li>
</ul>

<p><b>Note:</b><br>
Very complex equations may be inaccurate.</p>
</div>

</div>

<script>
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");

function resize(){
  cv.width = cv.clientWidth;
  cv.height = cv.clientHeight;
}
window.onresize = resize;
resize();

function parse(expr){
  expr = expr.replaceAll("^","**");
  expr = expr.replace(/sin/g,"Math.sin");
  expr = expr.replace(/cos/g,"Math.cos");
  expr = expr.replace(/tan/g,"Math.tan");
  expr = expr.replace(/e/g,"Math.E");

  if(expr.includes("=")){
    let [L,R] = expr.split("=");
    return `${L} - (${R})`;
  }
  return expr;
}

function draw(){
  let input = document.getElementById("expr").value;
  let expr = parse(input);

  ctx.clearRect(0,0,cv.width,cv.height);

  let scale = 40;
  let threshold = 0.05;

  for(let px=0; px<cv.width; px++){
    for(let py=0; py<cv.height; py++){

      let x = (px - cv.width/2)/scale;
      let y = (cv.height/2 - py)/scale;

      let val;
      try{
        val = eval(expr);
      }catch{
        continue;
      }

      if(!isFinite(val)) continue;

      if(Math.abs(val) < threshold){
        ctx.fillRect(px,py,1,1);
      }
    }
  }

  log("Drawn: " + input);

  if(input.length > 30){
    log("⚠ Equation may be too complex → inaccurate");
  }
}

function log(msg){
  let box = document.getElementById("info");
  box.innerHTML += msg + "<br>";
}
</script>

</body>
</html>
