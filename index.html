<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Graph Calculator</title>

<style>
body { font-family: sans-serif; }

#top { display:flex; }
#left { width:70%; }
#right { width:30%; padding:10px; background:#f5f5f5; }

canvas { border:1px solid black; cursor:crosshair; }

.graphItem {
    background:#eee;
    margin:5px;
    padding:5px;
}

#info {
    margin-top:10px;
    padding:10px;
    background:#111;
    color:#0f0;
    min-height:100px;
    white-space:pre-line;
}
</style>
</head>
<body>

<div id="top">

<div id="left">
<h2>📈 Advanced Graph Calculator</h2>

<input id="input" placeholder="y=2x+1">
<button onclick="addGraph()">Add</button>

<canvas id="canvas" width="800" height="500"></canvas>

<div id="info">👉 Click anywhere on graph</div>

<h3>📊 Graph List</h3>
<div id="list"></div>
</div>

<div id="right">

<h3>📘 Usage</h3>
<pre>
Use ^ for power
xx = x^2
xxx = x^3

Functions:
sin cos tan log sqrt abs

Examples:
y=2x+1
y=xx
y=1/x
y=sin(x)
</pre>

<h3>📚 Graph Info</h3>
<pre>
Linear → straight line
Quadratic → parabola
Inverse → hyperbola
Trig → wave functions
</pre>

</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let graphs=[];
let id=0;

let scale=40;
let originX=canvas.width/2;
let originY=canvas.height/2;

function transform(input){
    return input
        .replace("y=","")
        .replace(/\s/g,"")
        .replace(/x{2,}/g,m=>m.split("").join("*"))
        .replace(/\^/g,"**")
        .replace(/(\d)x/g,"$1*x")
        .replace(/x(\d)/g,"x*$1")
        .replace(/sin/g,"Math.sin")
        .replace(/cos/g,"Math.cos")
        .replace(/tan/g,"Math.tan")
        .replace(/log/g,"Math.log")
        .replace(/sqrt/g,"Math.sqrt")
        .replace(/abs/g,"Math.abs")
        .replace(/e/g,"Math.E");
}

function getDesc(input){
    let t=input.toLowerCase();

    if(t.includes("sin"))
        return "Sine Function\n- Periodic wave\n- Range: [-1,1]\n- Period: 2π";

    if(t.includes("cos"))
        return "Cosine Function\n- Shifted sine\n- Range: [-1,1]\n- Starts at 1";

    if(t.includes("tan"))
        return "Tangent Function\n- Vertical asymptotes\n- Period: π";

    if(t.includes("1/x"))
        return "Inverse Function\n- Hyperbola\n- Asymptotes: x=0, y=0";

    if(t.includes("log"))
        return "Log Function\n- Domain: x>0\n- Passes (1,0)";

    if(t.includes("sqrt"))
        return "Square Root\n- Domain: x≥0\n- Starts at (0,0)";

    if(t.includes("abs"))
        return "Absolute Value\n- V shape\n- Vertex (0,0)";

    if(t.match(/x\^?2|xx/))
        return "Quadratic\n- Parabola\n- Symmetry";

    if(t.match(/x\^?3|xxx/))
        return "Cubic\n- S shape\n- Inflection";

    if(t.match(/y=\d*x$/))
        return "Linear (Proportional)\n- Passes origin";

    if(t.match(/y=\d*x\+\d+/))
        return "Linear\n- Has intercept";

    return "General Function";
}

function addGraph(){
    let input=document.getElementById("input").value;
    if(!input) return;

    let expr=transform(input);

    let f;
    try{
        f=new Function("x","return "+expr);
        f(1);
    }catch{
        alert("Invalid expression");
        return;
    }

    let color=`hsl(${Math.random()*360},70%,50%)`;

    graphs.push({id,f,input,color});

    let div=document.createElement("div");
    div.className="graphItem";
    div.id="g"+id;

    div.innerHTML=`
    <b>#${id}</b> ${input}
    <pre>${getDesc(input)}</pre>
    <button onclick="removeGraph(${id})">Remove</button>
    `;

    document.getElementById("list").appendChild(div);

    id++;
}

function removeGraph(i){
    graphs=graphs.filter(g=>g.id!==i);
    document.getElementById("g"+i).remove();
}

function drawAxis(){
    ctx.strokeStyle="#000";

    // X
    ctx.beginPath();
    ctx.moveTo(0, originY);
    ctx.lineTo(canvas.width, originY);
    ctx.stroke();

    // Y
    ctx.beginPath();
    ctx.moveTo(originX, 0);
    ctx.lineTo(originX, canvas.height);
    ctx.stroke();

    ctx.fillStyle="#000";

    for(let i=-10;i<=10;i++){
        let x=originX+i*scale;
        let y=originY+i*scale;

        ctx.fillRect(x, originY-3,1,6);
        ctx.fillText(i, x-5, originY+15);

        ctx.fillRect(originX-3, y,6,1);
        if(i!==0) ctx.fillText(-i, originX+5, y+3);
    }
}

function drawGraphs(){
    graphs.forEach(g=>{
        ctx.strokeStyle=g.color;
        ctx.beginPath();

        let prev=false;

        for(let i=0;i<canvas.width;i++){
            let x=(i-originX)/scale;
            let y;

            try{y=g.f(x);}catch{prev=false;continue;}

            if(!isFinite(y)||Math.abs(y)>1000){
                prev=false;
                continue;
            }

            let py=originY-y*scale;

            if(!prev){
                ctx.moveTo(i,py);
                prev=true;
            }else{
                ctx.lineTo(i,py);
            }
        }

        ctx.stroke();
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawAxis();
    drawGraphs();
}

function loop(){
    draw();
    requestAnimationFrame(loop);
}
loop();

canvas.addEventListener("click", e=>{
    let rect=canvas.getBoundingClientRect();

    let px=e.clientX-rect.left;
    let py=e.clientY-rect.top;

    let x=(px-originX)/scale;
    let y=(originY-py)/scale;

    let text=`Clicked:\n(x=${x.toFixed(3)}, y=${y.toFixed(3)})\n\n`;

    graphs.forEach(g=>{
        try{
            let val=g.f(x);

            text+=`[Graph #${g.id}] ${g.input}\n`;
            text+=`f(x) = ${val.toFixed(4)}\n`;
            text+=`${getDesc(g.input)}\n\n`;

        }catch{}
    });

    document.getElementById("info").innerText=text;
});
</script>

</body>
</html>
