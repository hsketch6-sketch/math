<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>수학 개념 시각화</title>

<style>

body{
    font-family:Arial;
    background:#f3f6fb;
    padding:30px;
}

.box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px #ddd;
}


input,button,select{
    padding:12px;
    font-size:18px;
    margin:5px;
    border-radius:10px;
}


button{
    cursor:pointer;
    background:#4b7bec;
    color:white;
    border:0;
}


.balance{

    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    margin:50px;

}


.side{

    width:260px;
    min-height:150px;
    border:5px solid #555;
    border-radius:20px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    font-size:35px;

    background:#fafafa;

}


.equal{

    font-size:60px;

}


.block{

    display:inline-block;
    background:#4b7bec;
    color:white;

    padding:5px 10px;
    margin:3px;

    border-radius:8px;

}


.fade{

animation:fade .8s;

}


@keyframes fade{

0%{
opacity:1;
transform:translateY(0);
}

100%{
opacity:0;
transform:translateY(-40px);
}

}


.info{

font-size:25px;
margin-top:30px;

}


</style>

</head>


<body>


<div class="box">


<h1>⚖ 수학 개념 시각화</h1>


<input id="equation"
value="x+3=7"
placeholder="식 입력">


<button onclick="create()">
생성
</button>



<div class="balance">


<div class="side" id="left"></div>


<div class="equal">
=
</div>


<div class="side" id="right"></div>


</div>



<div>

제거할 값

<input id="remove"
type="number"
value="3">


<button onclick="removeValue()">
양쪽에서 제거
</button>

</div>



<div class="info" id="info">

</div>


</div>





<script>


let data={};


function parseEquation(eq){


eq=eq.replace(/\s/g,"");


let split=eq.split("=");


if(split.length!==2)
return null;



let left=split[0];
let right=Number(split[1]);



let match=left.match(
/x([+-]\d+)/
);


if(match){


return {

x:true,
number:Number(match[1]),
answer:right-Number(match[1])

};


}



if(left==="x"){


return{

x:true,
number:0,
answer:right

};

}



return null;


}




function blocks(n){


let html="";


for(let i=0;i<n;i++){

html+=`
<span class="block">■</span>
`;

}


return html;


}




function create(){


let eq=
document.getElementById("equation").value;



let result=parseEquation(eq);


if(!result){

alert("현재는 x+숫자=숫자 형태만 지원합니다.");
return;

}



data=result;



draw(false);


document.getElementById("info").innerHTML=
`
현재 개념 : 일차방정식<br>
양쪽 균형을 유지하면서 같은 수를 제거합니다.
`;



}




function draw(remove=false){



let left=document.getElementById("left");
let right=document.getElementById("right");



if(remove){


left.innerHTML=
`
<div class="fade">
x + ${data.number}
</div>
`;

right.innerHTML=
`
<div class="fade">
${data.number}
</div>
`;



}else{


left.innerHTML=
`
x ${data.number>0?"+ "+data.number:""}
<br>
${blocks(data.number)}
`;



right.innerHTML=
`
${data.answer+data.number}
<br>
${blocks(data.answer+data.number)}
`;


}



}




function removeValue(){



let value=
Number(
document.getElementById("remove").value
);



if(value!==data.number){

alert("x 옆 숫자와 같은 값을 제거해야 합니다.");
return;

}



draw(true);



setTimeout(()=>{


document.getElementById("left").innerHTML=
"x";


document.getElementById("right").innerHTML=
`
${data.answer}
<br>
${blocks(data.answer)}
`;



document.getElementById("info").innerHTML=
`
양쪽에서 ${value}을(를) 제거했습니다.<br>
결과 : x = ${data.answer}
`;



},800);



}




create();


</script>


</body>
</html>
