<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>
Educational Graph Calculator
</title>


<style>

*{
    box-sizing:border-box;
}


html,body{

    margin:0;
    height:100%;

    overflow:hidden;

    font-family:Arial,sans-serif;

}



#container{

    display:flex;

    width:100vw;

    height:100vh;

}



/* LEFT AREA */

#left{

    width:70%;

    height:100%;

    display:flex;

    flex-direction:column;

    min-height:0;

}



/* TOP */

#topbar{

    background:#222;

    color:white;

    padding:10px;

    flex-shrink:0;

}



#input{

    width:260px;

    padding:6px;

    font-size:15px;

}



button{

    cursor:pointer;

}



/* GRAPH */

#canvasWrap{

    flex:1;

    min-height:0;

}



canvas{

    width:100%;

    height:100%;

    display:block;

    background:white;

    cursor:grab;

}


canvas:active{

    cursor:grabbing;

}




/* INFO */

#info{

    height:100px;

    flex-shrink:0;

    overflow:auto;

    background:#111;

    color:#0f0;

    padding:10px;

}



/* GRAPH LIST */

#list{

    height:170px;

    overflow:auto;

    flex-shrink:0;

    border-top:1px solid #ccc;

}



.graphItem{

    padding:8px;

    border-bottom:1px solid #ddd;

}



.conceptBox{

    margin-top:8px;

    padding:10px;

    background:#eeeeee;

    border-radius:8px;

    line-height:1.5;

}





/* RIGHT */

#right{

    width:30%;

    height:100%;

    overflow:auto;

    background:#f4f4f4;

    padding:15px;

}



.card{

    background:white;

    padding:12px;

    margin-bottom:15px;

    border-radius:10px;

}



</style>

</head>



<body>



<div id="container">



<div id="left">


<div id="topbar">

📈 Educational Graph Calculator

<br><br>


<input id="input"
placeholder="Example: y=sin(x)">


<button onclick="addGraph()">

Add

</button>


</div>



<div id="canvasWrap">

<canvas id="canvas"></canvas>

</div>



<div id="info">

Click the graph to see values.

</div>



<div id="list">

</div>



</div>





<div id="right">


<h2>
📘 Guide
</h2>



<div class="card">

<b>Input Examples</b>

<br><br>

y=x^2

<br>

y=sin(x)

<br>

y=1/x

<br>

y=sqrt(x)

<br>

</div>



<div class="card">

<b>Controls</b>

<br><br>

🖱 Drag

<br>

Move graph

<br><br>

🖱 Wheel

<br>

Zoom

</div>



<div class="card">

<b>Functions</b>

<br><br>

sin(x)

→ Sine wave

<br><br>

cos(x)

→ Cosine wave

<br><br>

tan(x)

→ Tangent

<br><br>

sqrt(x)

→ Square root

<br><br>

abs(x)

→ Absolute value

</div>



</div>


</div>





<script>


const graphConcepts = {


sin:{

title:"Sine Function",

shape:
"It is a smooth wave that repeats regularly.",

properties:[

"The output value is between -1 and 1.",

"It is a periodic function.",

"The pattern repeats forever."

],

category:
"Trigonometry → Sine Function"

},



cos:{

title:"Cosine Function",

shape:
"It is a wave similar to sine but shifted.",

properties:[

"The output value is between -1 and 1.",

"It is periodic.",

"It starts at its maximum value when x=0."

],

category:
"Trigonometry → Cosine Function"

},



tan:{

title:"Tangent Function",

shape:
"It has repeating curves with gaps.",

properties:[

"It has vertical asymptotes.",

"The value can become extremely large."

],

category:
"Trigonometry → Tangent Function"

},



quadratic:{

title:"Quadratic Function",

shape:
"It creates a U-shaped parabola.",

properties:[

"It has a vertex.",

"It is symmetric.",

"The coefficient changes the direction."

],

category:
"Functions → Quadratic Function"

},



linear:{

title:"Linear Function",

shape:
"It creates a straight line.",

properties:[

"The slope controls steepness.",

"It has a constant rate of change."

],

category:
"Functions → Linear Function"

},



inverse:{

title:"Inverse Function",

shape:
"It creates two separated curves.",

properties:[

"It approaches the axes.",

"It represents inverse relationships."

],

category:
"Functions → Inverse Proportion"

},



sqrt:{

title:"Square Root Function",

shape:
"It starts from zero and grows slowly.",

properties:[

"The input cannot be negative.",

"The growth becomes slower."

],

category:
"Functions → Square Root Function"

},



absolute:{

title:"Absolute Value Function",

shape:
"It creates a V-shaped graph.",

properties:[

"Negative values become positive.",

"It has a vertex."

],

category:
"Functions → Absolute Value Function"

}



};
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");


let graphs=[];
let graphID=0;



/* Camera */

let scale=50;

let originX=0;
let originY=0;




/* Resize */

function resizeCanvas(){

    canvas.width=canvas.clientWidth;
    canvas.height=canvas.clientHeight;


    if(originX===0){

        originX=canvas.width/2;
        originY=canvas.height/2;

    }


    draw();

}


window.addEventListener(
"resize",
resizeCanvas
);





/* Find Concept */

function getConcept(input){

    let t=input.toLowerCase();


    if(t.includes("sin"))
        return graphConcepts.sin;


    if(t.includes("cos"))
        return graphConcepts.cos;


    if(t.includes("tan"))
        return graphConcepts.tan;


    if(
        t.includes("xx") ||
        t.includes("^2")
    )
        return graphConcepts.quadratic;


    if(t.includes("1/x"))
        return graphConcepts.inverse;


    if(t.includes("sqrt"))
        return graphConcepts.sqrt;


    if(t.includes("abs"))
        return graphConcepts.absolute;


    return graphConcepts.linear;

}






/* Convert Input */


function transform(input){

    let expr=input
    .toLowerCase()
    .replace(/^y=/,"")
    .replace(/\s/g,"");



    expr=expr.replace(
        /xx/g,
        "(x*x)"
    );


    expr=expr.replace(
        /\^/g,
        "**"
    );


    expr=expr.replace(
        /(\d)x/g,
        "$1*x"
    );



    expr=expr.replace(
        /sin/g,
        "Math.sin"
    );


    expr=expr.replace(
        /cos/g,
        "Math.cos"
    );


    expr=expr.replace(
        /tan/g,
        "Math.tan"
    );


    expr=expr.replace(
        /sqrt/g,
        "Math.sqrt"
    );


    expr=expr.replace(
        /abs/g,
        "Math.abs"
    );


    expr=expr.replace(
        /log/g,
        "Math.log"
    );


    return expr;

}








/* Add Graph */


function addGraph(){


    let input=
    document.getElementById("input").value;


    if(!input)
        return;



    let expr=transform(input);


    let f;


    try{

        f=new Function(
            "x",
            "return "+expr
        );


        f(1);

    }

    catch{

        alert("Invalid equation");

        return;

    }





    graphs.push({

        id:graphID,

        input,

        f,

        color:
        `hsl(${Math.random()*360},70%,50%)`

    });





    let concept=getConcept(input);



    let div=document.createElement("div");

    div.className="graphItem";

    div.id="graph"+graphID;



    div.innerHTML=`

    <b>
    #${graphID}
    </b>

    ${input}


    <br>

    <small>
    ${concept.title}
    </small>


    <br><br>


    <button onclick="toggleConcept(${graphID})">

    What is this graph?

    </button>



    <div 
    id="concept${graphID}"
    class="conceptBox"
    style="display:none">


    <b>
    This graph is the graph of ${input}.
    </b>


    <br><br>


    <b>Shape:</b>

    <br>

    ${concept.shape}


    <br><br>


    <b>Properties:</b>

    <br>

    ${
        concept.properties
        .map(
            x=>"• "+x
        )
        .join("<br>")
    }


    <br><br>


    <b>Concept:</b>

    <br>

    ${concept.category}


    </div>



    <button onclick="removeGraph(${graphID})">

    ❌

    </button>

    `;



    document
    .getElementById("list")
    .appendChild(div);



    graphID++;


    draw();

}







function toggleConcept(id){

    let box=
    document.getElementById(
        "concept"+id
    );


    if(box.style.display==="none")

        box.style.display="block";

    else

        box.style.display="none";

}






function removeGraph(id){


    graphs=
    graphs.filter(
        g=>g.id!==id
    );


    let box=
    document.getElementById(
        "graph"+id
    );


    if(box)
        box.remove();


    draw();

}









/* Coordinate */

function worldX(px){

    return(
        px-originX
    )/scale;

}



function worldY(py){

    return(
        originY-py
    )/scale;

}








/* Axis */


function drawAxis(){


    ctx.strokeStyle="#aaa";

    ctx.lineWidth=1;



    ctx.beginPath();


    ctx.moveTo(
        0,
        originY
    );


    ctx.lineTo(
        canvas.width,
        originY
    );


    ctx.moveTo(
        originX,
        0
    );


    ctx.lineTo(
        originX,
        canvas.height
    );


    ctx.stroke();





    ctx.fillStyle="#333";

    ctx.font="12px Arial";



    for(let i=-20;i<=20;i++){


        ctx.fillText(

            i,

            originX+i*scale,

            originY+15

        );


        if(i!==0)

        ctx.fillText(

            i,

            originX+5,

            originY-i*scale

        );


    }

}









/* Draw Graph */


function drawGraphs(){


    graphs.forEach(g=>{


        ctx.strokeStyle=g.color;

        ctx.lineWidth=2;


        ctx.beginPath();


        let started=false;



        for(
            let px=0;
            px<canvas.width;
            px+=2
        ){


            let x=worldX(px);

            let y;


            try{

                y=g.f(x);

            }

            catch{

                started=false;

                continue;

            }




            if(
                !Number.isFinite(y)
                ||
                Math.abs(y)>10000
            ){

                started=false;

                continue;

            }



            let py=
            originY-y*scale;



            if(!started){

                ctx.moveTo(px,py);

                started=true;

            }

            else{

                ctx.lineTo(px,py);

            }


        }


        ctx.stroke();


    });


}









function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );


    drawAxis();

    drawGraphs();

}









/* Drag */


let dragging=false;

let lastX,lastY;



canvas.addEventListener(
"mousedown",
e=>{

    dragging=true;

    lastX=e.clientX;

    lastY=e.clientY;

});



window.addEventListener(
"mouseup",
()=>{

    dragging=false;

});



window.addEventListener(
"mousemove",
e=>{


    if(!dragging)
        return;



    originX+=
    e.clientX-lastX;


    originY+=
    e.clientY-lastY;



    lastX=e.clientX;

    lastY=e.clientY;



    draw();


});









/* Zoom */


canvas.addEventListener(
"wheel",
e=>{


    e.preventDefault();



    let oldScale=scale;



    if(e.deltaY<0)

        scale*=1.1;

    else

        scale/=1.1;



    scale=Math.max(
        10,
        Math.min(
            scale,
            300
        )
    );



    let mx=e.offsetX;

    let my=e.offsetY;



    originX =
    mx-(mx-originX)
    *(scale/oldScale);



    originY =
    my-(my-originY)
    *(scale/oldScale);



    draw();


},
{
    passive:false
});









/* Click Info */


canvas.addEventListener(
"click",
e=>{


    let x=worldX(e.offsetX);



    let text=
    "x = "
    +x.toFixed(3)
    +"\n\n";



    graphs.forEach(g=>{


        let y=g.f(x);



        text+=
        g.input
        +
        "\n";


        text+=
        "y = "
        +
        y.toFixed(4)
        +
        "\n\n";


    });



    document.getElementById(
        "info"
    ).innerText=text;


});






resizeCanvas();


</script>
